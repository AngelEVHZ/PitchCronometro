<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowPass Pitch Timer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 28px 20px 40px;
      gap: 20px;
    }

    /* ── TOP: timer block ── */
    #top-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    #slide-number {
      font-size: 12px;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #slide-title {
      font-size: 26px;
      font-weight: 700;
      text-align: center;
    }

    #slide-duration {
      font-size: 13px;
      color: #555;
    }

    #timer-display {
      font-size: 80px;
      font-weight: 200;
      font-variant-numeric: tabular-nums;
      letter-spacing: -2px;
      color: #fff;
      line-height: 1;
      transition: color 0.3s;
    }
    #timer-display.over  { color: #ff3b30; }
    #timer-display.done  { color: #30d158; }

    #progress-wrap {
      width: 420px;
      max-width: 90vw;
      height: 4px;
      background: #1e1e1e;
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: #0a84ff;
      border-radius: 2px;
      transition: background 0.3s;
    }
    #progress-bar.over { background: #ff3b30; }

    #delta-badge {
      font-size: 20px;
      font-weight: 600;
      padding: 5px 16px;
      border-radius: 20px;
      min-width: 80px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #delta-badge.positive { background: rgba(255,59,48,0.12); color: #ff3b30; }
    #delta-badge.negative { background: rgba(48,209,88,0.12);  color: #30d158; }
    #delta-badge.visible  { opacity: 1; }

    /* ── PITCH TEXT ── */
    #pitch-box {
      width: 580px;
      max-width: 92vw;
      background: #161616;
      border: 1px solid #2e2e2e;
      border-radius: 14px;
      padding: 22px 26px;
      position: relative;
    }

    #pitch-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 12px;
    }

    #pitch-text {
      font-size: 17px;
      line-height: 1.7;
      color: #e8e8e8;
      white-space: pre-wrap;
    }

    #pitch-hint {
      font-size: 12px;
      color: #888;
      margin-top: 12px;
      font-style: italic;
      border-top: 1px solid #222;
      padding-top: 10px;
    }

    /* ── SCORE STRIP ── */
    #score-strip {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 520px;
    }

    .score-chip {
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      padding: 3px 9px;
      border-radius: 10px;
      background: #141414;
      color: #555;
      border: 1px solid #222;
    }
    .score-chip.chip-over     { border-color: rgba(255,59,48,0.4); color: #ff3b30; }
    .score-chip.chip-under    { border-color: rgba(48,209,88,0.4);  color: #30d158; }
    .score-chip.chip-current  { border-color: #0a84ff; color: #0a84ff; }

    #total-row { font-size: 13px; color: #444; }
    #total-val { font-weight: 700; }
    #total-val.positive { color: #ff3b30; }
    #total-val.negative { color: #30d158; }

    #hint { font-size: 11px; color: #2a2a2a; letter-spacing: 1px; }

    /* ── FINISHED ── */
    #finished {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
      padding-top: 40px;
    }
    #finished h2 { font-size: 26px; font-weight: 700; }

    #finished-table {
      border-collapse: collapse;
      font-size: 13px;
      width: 520px;
      max-width: 92vw;
    }
    #finished-table th {
      color: #444;
      font-weight: 500;
      padding: 6px 12px;
      text-align: left;
      border-bottom: 1px solid #1e1e1e;
    }
    #finished-table td {
      padding: 7px 12px;
      border-bottom: 1px solid #161616;
      color: #bbb;
    }
    #finished-table td.over  { color: #ff3b30; }
    #finished-table td.under { color: #30d158; }

    #restart-btn {
      background: #0a84ff;
      border: none;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      padding: 11px 30px;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 8px;
    }
    #restart-btn:hover { background: #0070d8; }

    #main-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      width: 100%;
    }
  </style>
</head>
<body>

<div id="main-view">
  <div id="top-block">
    <div id="slide-number">SLIDE 1 / 10</div>
    <div id="slide-title">—</div>
    <div id="slide-duration">0 seg · 0:00 → 0:00</div>
    <div id="timer-display">0:00</div>
    <div id="progress-wrap"><div id="progress-bar"></div></div>
    <div id="delta-badge">+0s</div>
  </div>

  <!-- Pitch text box -->
  <div id="pitch-box">
    <div id="pitch-label">Texto del slide</div>
    <div id="pitch-text"></div>
    <div id="pitch-hint"></div>
  </div>

  <div id="score-strip"></div>
  <div id="total-row">Total: <span id="total-val">0s</span></div>
  <div id="hint">ESPACIO o ENTER → iniciar</div>
</div>

<div id="finished">
  <h2>Pitch terminado</h2>
  <table id="finished-table">
    <thead>
      <tr>
        <th>#</th><th>Slide</th><th>Objetivo</th><th>Real</th><th>Delta</th>
      </tr>
    </thead>
    <tbody id="finished-tbody"></tbody>
  </table>
  <div id="total-row-final" style="font-size:14px;color:#444"></div>
  <button id="restart-btn">Reiniciar</button>
</div>

<script>
  const SLIDES = [
    {
      title: "Portada",
      start: 0, end: 14,
      text: "Somos FlowPass — el sistema operativo para cualquier negocio basado en membresías y servicios recurrentes: deportes, arte, música, idiomas, salud y más. Un solo sistema. Sin hojas de cálculo. Control total.",
      hint: "De pie, mirando al jurado. Cierra con el tagline del slide."
    },
    {
      title: "El problema — $6.3B",
      start: 14, end: 39,
      text: "Son más de 500,000 negocios solo en Latinoamérica — y juntos pierden $6.3 mil millones de dólares al año. Cada negocio pierde hasta $12,700 USD anuales — el 20% de sus ingresos — por pagos perdidos, operaciones ineficientes y miembros que se van sin renovar.",
      hint: "Pausa después de \"$6.3 mil millones\" — deja que aterrice."
    },
    {
      title: "¿Por qué sigue pasando?",
      start: 39, end: 61,
      text: "¿Por qué sigue pasando? Porque el dueño lo hace todo — atiende, administra y cobra. Pasan horas en WhatsApp recordando pagos, en Excel registrando asistencia, contactando uno por uno a los miembros que no renovaron. Eso no es gestión — es apagar incendios todos los días.",
      hint: "\"Apagar incendios\" conecta con el cierre del slide 8."
    },
    {
      title: "Solución — FlowPass + Flowy",
      start: 61, end: 97,
      text: "No somos solo otro software de gestión. Estamos construyendo el primer sistema operativo autónomo para estos negocios en Latinoamérica.\n\nImagina esto: El agente de FlowPass detecta que 12 miembros no han renovado, les escribe por WhatsApp, procesa el pago y actualiza su estado — solo, sin que nadie lo active.\n\nEl miembro llega a la puerta, muestra su QR, y el sistema ya sabe si puede entrar.\n\nEl dueño nunca tuvo que hacer nada. Solo hacer lo que le apasiona.\n\nEso es FlowPass IA-first: agentes que operan el negocio por ti.",
      hint: "Pausa después de \"por ti\" — es la frase ancla del pitch."
    },
    {
      title: "Producto en acción",
      start: 97, end: 114,
      text: "Y ya estamos viendo los resultados. 20% menos tiempo en operaciones. 10 a 15% menos pagos atrasados. Los dueños tienen visibilidad total de su negocio en tiempo real — sin hojas de cálculo, sin perseguir a nadie.",
      hint: "El slide muestra el producto — tú solo dices los números."
    },
    {
      title: "Mercado — $8M → $312M",
      start: 114, end: 136,
      text: "El mercado accesible para nosotros hoy son 13,000 negocios — el 4% del total — lo que representa $8M en ARR. Y más allá de ese punto de entrada, el mercado total en LatAm vale $312M. Empezamos enfocados y escalamos.",
      hint: "Actualizado a $312M para alinearlo con el deck v2."
    },
    {
      title: "Tracción — métricas reales",
      start: 136, end: 162,
      text: "Y ya estamos capturando ese mercado. 24 clientes pagantes, $1,245 de MRR, CAC de $32 y churn de 0.6% — solo un cliente perdido en 7 meses. En los últimos 3 meses sumamos 14 nuevos clientes. Y lo más revelador: 3 clientes abandonaron un competidor para venir a FlowPass, y 8 nos eligieron después de comparar el mercado. Eso no es suerte — es producto-mercado.",
      hint: "Al llegar al 2:42 debes estar cerrando este slide."
    },
    {
      title: "Visión · Hitos · Use of Funds",
      start: 162, end: 182,
      text: "Justo ahora estamos abriendo México. Para este año: Flowy con clientes reales y 60 negocios activos. El año que viene, somos el sistema operativo autónomo de referencia en LatAm.\n\nLos fondos van a dos frentes: desarrollo de los agentes de IA y aceleración de la entrada a México. Cada sol directo a producto y mercado.",
      hint: "Slide rápido — los hitos los muestra el deck, tú solo los dices comprimidos."
    },
    {
      title: "Equipo — ¿Por qué nosotros?",
      start: 182, end: 205,
      text: "Vimos que el mercado estaba desatendido — software caro, complejo, sin IA y sin atención real al cliente. Decidimos construirlo diferente: simple, accesible y autónomo. En 7 meses, 24 negocios pagantes nos eligieron sobre la competencia. Grecia, Ángel y Piero — ventas, tecnología y operaciones — el tridente que necesita esta startup.",
      hint: "La tracción responde el \"por qué nosotros\" mejor que cualquier credencial."
    },
    {
      title: "Cierre + CTA + logos",
      start: 205, end: 219,
      text: "Tenemos el producto, la tracción y el equipo. Si quieren ver FlowPass en acción o explorar cómo crecer juntos, agendemos una segunda conversación. Gracias — somos FlowPass.",
      hint: "Termina siempre con el nombre. Los logos hacen el trabajo visual."
    },
  ];

  let currentSlide = 0;
  let running = false;
  let slideStartTime = 0;
  let slideDeltas = [];
  let raf = null;

  const elTimer    = document.getElementById('timer-display');
  const elTitle    = document.getElementById('slide-title');
  const elNumber   = document.getElementById('slide-number');
  const elDuration = document.getElementById('slide-duration');
  const elBar      = document.getElementById('progress-bar');
  const elDelta    = document.getElementById('delta-badge');
  const elStrip    = document.getElementById('score-strip');
  const elTotal    = document.getElementById('total-val');
  const elHint     = document.getElementById('hint');
  const elPitchText = document.getElementById('pitch-text');
  const elPitchHint = document.getElementById('pitch-hint');
  const elMain     = document.getElementById('main-view');
  const elFinished = document.getElementById('finished');

  function fmt(secs) {
    const s = Math.abs(Math.floor(secs));
    const m = Math.floor(s / 60);
    const ss = String(s % 60).padStart(2, '0');
    return `${m}:${ss}`;
  }

  function fmtDelta(d) {
    const s = Math.round(d);
    return (s >= 0 ? '+' : '') + s + 's';
  }

  function loadSlide(idx) {
    const sl = SLIDES[idx];
    const dur = sl.end - sl.start;
    elNumber.textContent   = `SLIDE ${idx + 1} / ${SLIDES.length}`;
    elTitle.textContent    = sl.title;
    elDuration.textContent = `${dur} seg  ·  ${fmt(sl.start)} → ${fmt(sl.end)}`;
    elPitchText.textContent = sl.text;
    elPitchHint.textContent = sl.hint ? `💡 ${sl.hint}` : '';
    elTimer.textContent    = '0:00';
    elTimer.className      = '';
    elBar.style.width      = '0%';
    elBar.className        = '';
    elDelta.className      = '';
    elDelta.textContent    = '';
  }

  function updateStrip() {
    elStrip.innerHTML = '';
    const total = slideDeltas.reduce((a, b) => a + b, 0);

    slideDeltas.forEach((d, i) => {
      const chip = document.createElement('div');
      chip.className = 'score-chip ' + (d > 0 ? 'chip-over' : d < 0 ? 'chip-under' : '');
      chip.textContent = `S${i + 1}: ${fmtDelta(d)}`;
      elStrip.appendChild(chip);
    });

    if (currentSlide < SLIDES.length) {
      const chip = document.createElement('div');
      chip.className = 'score-chip chip-current';
      chip.textContent = `S${currentSlide + 1}: …`;
      elStrip.appendChild(chip);
    }

    const t = Math.round(total);
    elTotal.textContent = fmtDelta(t);
    elTotal.className   = t > 0 ? 'positive' : t < 0 ? 'negative' : '';
  }

  function tick() {
    if (!running) return;
    const sl = SLIDES[currentSlide];
    const dur = sl.end - sl.start;
    const elapsed = (performance.now() - slideStartTime) / 1000;
    const isOver  = elapsed > dur;

    elTimer.textContent = fmt(elapsed);
    elTimer.className   = isOver ? 'over' : '';

    const pct = Math.min((elapsed / dur) * 100, 100);
    elBar.style.width = pct + '%';
    elBar.className   = isOver ? 'over' : '';

    const liveDelta = elapsed - dur;
    elDelta.textContent = fmtDelta(liveDelta);
    elDelta.className   = 'visible ' + (liveDelta > 0 ? 'positive' : 'negative');

    raf = requestAnimationFrame(tick);
  }

  function startSlide() {
    slideStartTime = performance.now();
    running = true;
    loadSlide(currentSlide);
    updateStrip();
    raf = requestAnimationFrame(tick);
    elHint.textContent = 'ENTER → siguiente slide';
  }

  function advance() {
    if (!running && currentSlide === 0) {
      startSlide();
      return;
    }
    if (!running) return;

    const sl = SLIDES[currentSlide];
    const dur = sl.end - sl.start;
    const elapsed = (performance.now() - slideStartTime) / 1000;
    slideDeltas.push(elapsed - dur);

    currentSlide++;
    if (currentSlide >= SLIDES.length) {
      running = false;
      cancelAnimationFrame(raf);
      showFinished();
      return;
    }
    startSlide();
  }

  function showFinished() {
    elMain.style.display     = 'none';
    elFinished.style.display = 'flex';

    const tbody = document.getElementById('finished-tbody');
    tbody.innerHTML = '';
    let total = 0;

    slideDeltas.forEach((d, i) => {
      const sl  = SLIDES[i];
      const dur = sl.end - sl.start;
      total += d;
      const tr  = document.createElement('tr');
      const cls = d > 0 ? 'over' : d < 0 ? 'under' : '';
      tr.innerHTML = `
        <td>${i + 1}</td>
        <td>${sl.title}</td>
        <td>${dur}s</td>
        <td>${Math.round(dur + d)}s</td>
        <td class="${cls}">${fmtDelta(d)}</td>
      `;
      tbody.appendChild(tr);
    });

    const t = Math.round(total);
    document.getElementById('total-row-final').innerHTML =
      `Total acumulado: <strong style="color:${t > 0 ? '#ff3b30' : '#30d158'}">${fmtDelta(t)}</strong> vs objetivo 3:39`;
  }

  function reset() {
    cancelAnimationFrame(raf);
    currentSlide = 0;
    running      = false;
    slideDeltas  = [];
    elMain.style.display     = 'flex';
    elFinished.style.display = 'none';
    loadSlide(0);
    updateStrip();
    elHint.textContent  = 'ESPACIO o ENTER → iniciar';
    elTotal.textContent = '0s';
    elTotal.className   = '';
    elDelta.className   = '';
  }

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Enter' || e.code === 'Space') {
      e.preventDefault();
      advance();
    }
  });

  document.getElementById('restart-btn').addEventListener('click', reset);

  loadSlide(0);
  updateStrip();
</script>
</body>
</html>
