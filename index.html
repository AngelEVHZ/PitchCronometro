<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowPass Pitch Timer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 28px 20px 40px;
      gap: 20px;
    }

    /* ── TOP: timer block ── */
    #top-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    #slide-number {
      font-size: 12px;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #slide-title {
      font-size: 26px;
      font-weight: 700;
      text-align: center;
    }

    #slide-duration {
      font-size: 13px;
      color: #555;
    }

    #timer-display {
      font-size: 80px;
      font-weight: 200;
      font-variant-numeric: tabular-nums;
      letter-spacing: -2px;
      color: #fff;
      line-height: 1;
      transition: color 0.3s;
    }
    #timer-display.over  { color: #ff3b30; }
    #timer-display.done  { color: #30d158; }

    #progress-wrap {
      width: 420px;
      max-width: 90vw;
      height: 4px;
      background: #1e1e1e;
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: #0a84ff;
      border-radius: 2px;
      transition: background 0.3s;
    }
    #progress-bar.over { background: #ff3b30; }

    #delta-badge {
      font-size: 20px;
      font-weight: 600;
      padding: 5px 16px;
      border-radius: 20px;
      min-width: 80px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #delta-badge.positive { background: rgba(255,59,48,0.12); color: #ff3b30; }
    #delta-badge.negative { background: rgba(48,209,88,0.12);  color: #30d158; }
    #delta-badge.visible  { opacity: 1; }

    /* ── PITCH TEXT styles ── */
    #pitch-box {
      background: #161616;
      border: 1px solid #2e2e2e;
      border-radius: 14px;
      padding: 22px 26px;
      flex: 1;
      min-width: 280px;
      max-width: 480px;
      position: sticky;
      top: 28px;
    }

    #pitch-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 12px;
    }

    #pitch-text {
      font-size: 17px;
      line-height: 1.7;
      color: #e8e8e8;
      white-space: pre-wrap;
    }

    #pitch-hint {
      font-size: 12px;
      color: #888;
      margin-top: 12px;
      font-style: italic;
      border-top: 1px solid #222;
      padding-top: 10px;
    }

    /* ── SCORE STRIP ── */
    #score-strip {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 520px;
    }

    .score-chip {
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      padding: 3px 9px;
      border-radius: 10px;
      background: #141414;
      color: #555;
      border: 1px solid #222;
    }
    .score-chip.chip-over     { border-color: rgba(255,59,48,0.4); color: #ff3b30; }
    .score-chip.chip-under    { border-color: rgba(48,209,88,0.4);  color: #30d158; }
    .score-chip.chip-current  { border-color: #0a84ff; color: #0a84ff; }

    #total-row { font-size: 13px; color: #444; }
    #total-val { font-weight: 700; }
    #total-val.positive { color: #ff3b30; }
    #total-val.negative { color: #30d158; }

    #hint { font-size: 11px; color: #2a2a2a; letter-spacing: 1px; }

    /* ── FINISHED ── */
    #finished {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
      padding-top: 40px;
    }
    #finished h2 { font-size: 26px; font-weight: 700; }

    #finished-table {
      border-collapse: collapse;
      font-size: 13px;
      width: 520px;
      max-width: 92vw;
    }
    #finished-table th {
      color: #444;
      font-weight: 500;
      padding: 6px 12px;
      text-align: left;
      border-bottom: 1px solid #1e1e1e;
    }
    #finished-table td {
      padding: 7px 12px;
      border-bottom: 1px solid #161616;
      color: #bbb;
    }
    #finished-table td.over  { color: #ff3b30; }
    #finished-table td.under { color: #30d158; }

    #restart-btn, #tap-btn {
      background: #0a84ff;
      border: none;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      padding: 11px 30px;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 8px;
    }
    #restart-btn:hover, #tap-btn:hover { background: #0070d8; }

    #tap-btn {
      display: none;
      width: 100%;
      max-width: 360px;
      font-size: 17px;
      padding: 15px 30px;
    }

    @media (pointer: coarse) {
      #tap-btn { display: block; }
      #hint { display: none; }
    }

    #main-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      width: 100%;
    }

    #left-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      width: 100%;
    }

    @media (min-width: 860px) {
      #main-view {
        flex-direction: row;
        align-items: flex-start;
        justify-content: center;
        gap: 40px;
        max-width: 1100px;
      }

      #left-col {
        width: auto;
        flex-shrink: 0;
      }
    }
  </style>
</head>
<body>

<div id="main-view">
  <div id="left-col">
    <div id="top-block">
      <div id="slide-number">SLIDE 1 / 10</div>
      <div id="slide-title">—</div>
      <div id="slide-duration">0 seg · 0:00 → 0:00</div>
      <div id="timer-display">0:00</div>
      <div id="progress-wrap"><div id="progress-bar"></div></div>
      <div id="delta-badge">+0s</div>
    </div>
    <div id="score-strip"></div>
    <div id="total-row">Total: <span id="total-val">0s</span></div>
    <div id="hint">ESPACIO o ENTER → iniciar</div>
    <button id="tap-btn">Iniciar / Siguiente →</button>
  </div>

  <!-- Pitch text box — derecha en desktop, abajo en móvil -->
  <div id="pitch-box">
    <div id="pitch-label">Texto del slide</div>
    <div id="pitch-text"></div>
    <div id="pitch-hint"></div>
  </div>
</div>

<div id="finished">
  <h2>Pitch terminado</h2>
  <table id="finished-table">
    <thead>
      <tr>
        <th>#</th><th>Slide</th><th>Objetivo</th><th>Real</th><th>Delta</th>
      </tr>
    </thead>
    <tbody id="finished-tbody"></tbody>
  </table>
  <div id="total-row-final" style="font-size:14px;color:#444"></div>
  <button id="restart-btn">Reiniciar</button>
</div>

<script>
  const SLIDES = [
    {
      title: "Portada",
      start: 0, end: 12,
      text: "Somos FlowPass — el sistema operativo para negocios de membresías y servicios recurrentes: deportes, arte, música, idiomas, salud. Un solo sistema. Control total.",
      hint: "De pie, mirando al jurado. Cierra con el tagline del slide."
    },
    {
      title: "El problema — $6.3B",
      start: 12, end: 32,
      text: "Más de 500,000 negocios en Latinoamérica pierden juntos $6.3 mil millones de dólares al año. Cada uno pierde hasta $12,700 USD anuales — el 20% de sus ingresos — por pagos perdidos, ineficiencias y miembros que no renuevan.",
      hint: "Pausa después de \"$6.3 mil millones\" — deja que aterrice."
    },
    {
      title: "¿Por qué sigue pasando?",
      start: 32, end: 50,
      text: "¿Por qué sigue pasando? Porque el dueño lo hace todo. Horas en WhatsApp cobrando, Excel registrando asistencia, persiguiendo a cada miembro que no renovó. Eso no es gestión — es apagar incendios.",
      hint: "\"Apagar incendios\" conecta con el slide 4."
    },
    {
      title: "Solución — FlowPass + Flowy",
      start: 50, end: 82,
      text: "No somos otro software de gestión. Estamos construyendo el primer sistema operativo autónomo para estos negocios en Latinoamérica.\n\nImagina esto:\n\nEl agente de FlowPass detecta que 12 miembros no renovaron, les escribe por WhatsApp, procesa el pago y actualiza su estado — solo.\n\nEl miembro llega, muestra su QR, y el sistema ya sabe si puede entrar.\n\nEl dueño no hizo nada. Solo lo que le apasiona.\n\nEso es FlowPass IA-first: agentes que operan el negocio por ti.",
      hint: "Pausa después de \"por ti\" — es la frase ancla del pitch."
    },
    {
      title: "Producto en acción",
      start: 82, end: 96,
      text: "Y ya estamos viendo los resultados. 20% menos tiempo en operaciones. Hasta 15% menos pagos atrasados. Visibilidad total del negocio en tiempo real.",
      hint: "El slide muestra el producto — tú solo dices los números."
    },
    {
      title: "Mercado — $8M → $312M",
      start: 96, end: 114,
      text: "Nuestro mercado accesible hoy son 13,000 negocios — 4% del total — $8M en ARR. El mercado total en LatAm vale $312M. Empezamos enfocados y escalamos.",
      hint: "Alineado con el deck v2."
    },
    {
      title: "Tracción — métricas reales",
      start: 114, end: 136,
      text: "24 clientes pagantes, $1,245 de MRR, CAC de $32, churn de 0.6% — un solo cliente perdido en 7 meses. En los últimos 3 meses sumamos 14 nuevos. Y lo clave: 3 dejaron a un competidor por nosotros, 8 nos eligieron tras comparar. Eso es producto-mercado.",
      hint: "Al llegar al 2:16 cierras este slide."
    },
    {
      title: "Visión · Hitos · Use of Funds",
      start: 136, end: 152,
      text: "Hoy abrimos México. Este año: Flowy con clientes reales y 60 negocios activos. El próximo: el sistema operativo autónomo de referencia en LatAm.\n\nLos fondos van a dos frentes: agentes de IA y entrada a México.",
      hint: "Slide rápido — los hitos los muestra el deck."
    },
    {
      title: "Equipo — ¿Por qué nosotros?",
      start: 152, end: 170,
      text: "Vimos un mercado desatendido — software caro, sin IA, sin servicio. Lo construimos diferente: simple, accesible, autónomo. En 7 meses, 24 negocios nos eligieron sobre la competencia. Grecia, Ángel y Piero — ventas, tecnología y operaciones.",
      hint: "La tracción responde \"por qué nosotros\" mejor que cualquier credencial."
    },
    {
      title: "Cierre + CTA",
      start: 170, end: 180,
      text: "Tenemos producto, tracción y equipo. Agendemos una segunda conversación. Gracias — somos FlowPass.",
      hint: "Termina siempre con el nombre. Los logos hacen el trabajo visual."
    },
  ];

  let currentSlide = 0;
  let running = false;
  let slideStartTime = 0;
  let slideDeltas = [];
  let raf = null;

  const elTimer    = document.getElementById('timer-display');
  const elTitle    = document.getElementById('slide-title');
  const elNumber   = document.getElementById('slide-number');
  const elDuration = document.getElementById('slide-duration');
  const elBar      = document.getElementById('progress-bar');
  const elDelta    = document.getElementById('delta-badge');
  const elStrip    = document.getElementById('score-strip');
  const elTotal    = document.getElementById('total-val');
  const elHint     = document.getElementById('hint');
  const elTapBtn   = document.getElementById('tap-btn');
  const elPitchText = document.getElementById('pitch-text');
  const elPitchHint = document.getElementById('pitch-hint');
  const elMain     = document.getElementById('main-view');
  const elFinished = document.getElementById('finished');

  function fmt(secs) {
    const s = Math.abs(Math.floor(secs));
    const m = Math.floor(s / 60);
    const ss = String(s % 60).padStart(2, '0');
    return `${m}:${ss}`;
  }

  function fmtDelta(d) {
    const s = Math.round(d);
    const sign = s >= 0 ? '+' : '-';
    const abs = Math.abs(s);
    if (abs < 60) return sign + abs + 's';
    const m = Math.floor(abs / 60);
    const ss = String(abs % 60).padStart(2, '0');
    return sign + m + ':' + ss + ' min';
  }

  function loadSlide(idx) {
    const sl = SLIDES[idx];
    const dur = sl.end - sl.start;
    elNumber.textContent   = `SLIDE ${idx + 1} / ${SLIDES.length}`;
    elTitle.textContent    = sl.title;
    elDuration.textContent = `${dur} seg  ·  ${fmt(sl.start)} → ${fmt(sl.end)}`;
    elPitchText.textContent = sl.text;
    elPitchHint.textContent = sl.hint ? `💡 ${sl.hint}` : '';
    elTimer.textContent    = '0:00';
    elTimer.className      = '';
    elBar.style.width      = '0%';
    elBar.className        = '';
    elDelta.className      = '';
    elDelta.textContent    = '';
  }

  function updateStrip() {
    elStrip.innerHTML = '';
    const total = slideDeltas.reduce((a, b) => a + b, 0);

    slideDeltas.forEach((d, i) => {
      const chip = document.createElement('div');
      chip.className = 'score-chip ' + (d > 0 ? 'chip-over' : d < 0 ? 'chip-under' : '');
      chip.textContent = `S${i + 1}: ${fmtDelta(d)}`;
      elStrip.appendChild(chip);
    });

    if (currentSlide < SLIDES.length) {
      const chip = document.createElement('div');
      chip.className = 'score-chip chip-current';
      chip.textContent = `S${currentSlide + 1}: …`;
      elStrip.appendChild(chip);
    }

    const t = Math.round(total);
    elTotal.textContent = fmtDelta(t);
    elTotal.className   = t > 0 ? 'positive' : t < 0 ? 'negative' : '';
  }

  function tick() {
    if (!running) return;
    const sl = SLIDES[currentSlide];
    const dur = sl.end - sl.start;
    const elapsed = (performance.now() - slideStartTime) / 1000;
    const isOver  = elapsed > dur;

    elTimer.textContent = fmt(elapsed);
    elTimer.className   = isOver ? 'over' : '';

    const pct = Math.min((elapsed / dur) * 100, 100);
    elBar.style.width = pct + '%';
    elBar.className   = isOver ? 'over' : '';

    const liveDelta = elapsed - dur;
    elDelta.textContent = fmtDelta(liveDelta);
    elDelta.className   = 'visible ' + (liveDelta > 0 ? 'positive' : 'negative');

    raf = requestAnimationFrame(tick);
  }

  function startSlide() {
    slideStartTime = performance.now();
    running = true;
    loadSlide(currentSlide);
    updateStrip();
    raf = requestAnimationFrame(tick);
    elHint.textContent = 'ENTER → siguiente slide';
    elTapBtn.textContent = 'Siguiente →';
  }

  function advance() {
    if (!running && currentSlide === 0) {
      startSlide();
      return;
    }
    if (!running) return;

    const sl = SLIDES[currentSlide];
    const dur = sl.end - sl.start;
    const elapsed = (performance.now() - slideStartTime) / 1000;
    slideDeltas.push(elapsed - dur);

    currentSlide++;
    if (currentSlide >= SLIDES.length) {
      running = false;
      cancelAnimationFrame(raf);
      showFinished();
      return;
    }
    startSlide();
  }

  function showFinished() {
    elMain.style.display     = 'none';
    elFinished.style.display = 'flex';

    const tbody = document.getElementById('finished-tbody');
    tbody.innerHTML = '';
    let total = 0;

    slideDeltas.forEach((d, i) => {
      const sl  = SLIDES[i];
      const dur = sl.end - sl.start;
      total += d;
      const tr  = document.createElement('tr');
      const cls = d > 0 ? 'over' : d < 0 ? 'under' : '';
      tr.innerHTML = `
        <td>${i + 1}</td>
        <td>${sl.title}</td>
        <td>${dur}s</td>
        <td>${Math.round(dur + d)}s</td>
        <td class="${cls}">${fmtDelta(d)}</td>
      `;
      tbody.appendChild(tr);
    });

    const t = Math.round(total);
    document.getElementById('total-row-final').innerHTML =
      `Total acumulado: <strong style="color:${t > 0 ? '#ff3b30' : '#30d158'}">${fmtDelta(t)}</strong> vs objetivo 2:50`;
  }

  function reset() {
    cancelAnimationFrame(raf);
    currentSlide = 0;
    running      = false;
    slideDeltas  = [];
    elMain.style.display     = 'flex';
    elFinished.style.display = 'none';
    loadSlide(0);
    updateStrip();
    elHint.textContent  = 'ESPACIO o ENTER → iniciar';
    elTapBtn.textContent = 'Iniciar / Siguiente →';
    elTotal.textContent = '0s';
    elTotal.className   = '';
    elDelta.className   = '';
  }

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Enter' || e.code === 'Space') {
      e.preventDefault();
      advance();
    }
  });

  document.getElementById('tap-btn').addEventListener('click', advance);

  document.getElementById('main-view').addEventListener('touchend', (e) => {
    if (e.target.closest('#restart-btn') || e.target.closest('#tap-btn')) return;
    e.preventDefault();
    advance();
  }, { passive: false });

  document.getElementById('restart-btn').addEventListener('click', reset);

  loadSlide(0);
  updateStrip();
</script>
</body>
</html>
